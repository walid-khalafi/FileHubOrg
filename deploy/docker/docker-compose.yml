services:

  app:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile

    container_name: filehuborg

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "8080:80"

    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
      ASPNETCORE_URLS: "${ASPNETCORE_URLS:-http://+:80}"

      ConnectionStrings__DefaultConnection: "${DEFAULT_CONNECTION}"
      Jwt__Secret: "${JWT__SECRET}"
      Ldap__Url: "${LDAP__URL}"
      Ldap__Port: "${LDAP__PORT:-389}"
      Ldap__UseSsl: "${LDAP__USESSL:-false}"
      Ldap__BindOn: "${LDAP__BINDON}"
      Ldap__BindCredentials: "${LDAP__BINDCREDENTIALS}"
      Ldap__SearchBase: "${LDAP__SEARCHBASE}"
      Ldap__SearchFilter: "${LDAP__SEARCHFILTER}"
      Ldap__UIDAttribute: "${LDAP__UIDATTRIBUTE}"
      Ldap__SAMAccountNameAttribute: "${LDAP__SAMACCOUNTNAMEATTRIBUTE}"
      Ldap__DisplayNameAttribute: "${LDAP__DISPLAYNAMEATTRIBUTE}"
      Ldap__EmailNameAttribute: "${LDAP__EMAILNAMEATTRIBUTE}"

    depends_on:
      - db

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest

    container_name: filehuborg-sql

    restart: unless-stopped

    env_file:
      - .env

    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${SA_PASSWORD}"

    ports:
      - "1433:1433"

    volumes:
      - sql_data:/var/opt/mssql

    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD}' -C -Q 'SELECT 1'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

volumes:
  sql_data:
