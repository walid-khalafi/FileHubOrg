name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: |
          echo "DEFAULT_CONNECTION=${{ secrets.DEFAULT_CONNECTION }}" >> deploy/docker/.env
          echo "SA_PASSWORD=${{ secrets.SA_PASSWORD }}" >> deploy/docker/.env
          echo "JWT__SECRET=${{ secrets.JWT__SECRET }}" >> deploy/docker/.env
          echo "LDAP__URL=${{ secrets.LDAP__URL }}" >> deploy/docker/.env
          echo "LDAP__BINDCREDENTIALS=${{ secrets.LDAP__BINDCREDENTIALS }}" >> deploy/docker/.env

      - name: Build Docker Image
        run: |
          docker build \
            -f deploy/docker/Dockerfile \
            -t filehuborg .

      - name: Docker Compose Config Check
        run: |
          docker compose \
            -f deploy/docker/docker-compose.yml \
            config
